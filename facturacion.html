<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Facturación - Áurea Deco</title>
    <link rel="stylesheet" href="estilos.css">
        <link rel="icon" type="image/png" href="favicon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 30px 20px;
        }

        .contenedor-moderno {
            max-width: 1100px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border-top: 5px solid #17a2b8;
            /* Rayita celeste arriba */
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
            margin-bottom: 10px;
        }

        h1 {
            margin: 0;
            color: #1a1a1a;
            font-size: 24px;
            font-weight: 900;
        }

        .btn-volver {
            text-decoration: none;
            background: #2c3e50;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn-volver:hover {
            background: #1a252f;
        }

        .subtitulo {
            text-align: left;
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* Estilos de la Tabla de Facturación */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: #e9ecef;
            color: #495057;
            text-align: left;
            padding: 12px 15px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
        }

        th:first-child {
            border-top-left-radius: 6px;
        }

        th:last-child {
            border-top-right-radius: 6px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            vertical-align: middle;
        }

        tr:hover {
            background-color: #f8f9fa;
        }

        /* Estilos extra para botones internos de la tabla */
        button {
            font-family: 'Montserrat', sans-serif;
        }
    </style>
</head>

<body>
    <div class="contenedor-moderno">
        <header>
            <h1>🧾 Centro de Facturación</h1>
            <a href="portal.html" class="btn-volver">Volver al Portal</a>
        </header>

        <p class="subtitulo">
            Mostrando pedidos despachados abonados por <b>Transferencia Bancaria</b>, listos para emitir comprobante en
            ARCA.
        </p>

        <table id="tabla-facturas">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>DNI / CUIT</th>
                    <th>Concepto</th>
                    <th>Monto a Facturar</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="cuerpo-facturas">
                <tr>
                    <td colspan="6" style="text-align: center; padding: 30px;">Cargando datos...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="facturacion.js"></script>
</body>

</html>
