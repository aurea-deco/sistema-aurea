<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Diseño - Áurea</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
    <link rel="icon" type="image/png" href="favicon.png">
 
    <style>
        .contenedor-tarjetas {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .tarjeta-diseno {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 320px;
            border-top: 4px solid #1a1a1a;
        }

        .tarjeta-dxf {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 320px;
            border-top: 4px solid #007bff;
        }

        .datos-cartel {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 6px;
            margin: 15px 0;
            border-left: 3px solid #d4af37;
            font-family: monospace;
            font-size: 15px;
        }

        .input-link {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .btn-subir {
            background-color: #1a1a1a;
            color: #d4af37;
            border: none;
            padding: 10px;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-subir:hover {
            background-color: #333;
        }

        .btn-dxf {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn-dxf:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <div id="cargando" style="text-align: center;">Buscando pedidos... ⏳</div>
    <h2 style="text-align: center; margin-top: 30px;">Bandeja 1: Armar Diseños (PDF)</h2>
    
    <div class="contenedor-tarjetas" id="contenedor-nuevos"></div>

    <hr style="margin: 40px auto; max-width: 1000px; border: 0; border-top: 2px dashed #ccc;">

    <h2 style="text-align: center; color: #707070;">Bandeja 2: Generar cortes  (DXF)</h2>
    <div class="contenedor-tarjetas" id="contenedor-dxf"></div>

    <script src="disenador.js"></script>
</body>

</html>
