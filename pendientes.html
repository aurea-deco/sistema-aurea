<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Pendientes - Áurea</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        /* Estilos específicos para las tarjetas de esta pantalla */
        .contenedor-tarjetas {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1000px;
            margin: 0 auto;
        }

        .tarjeta-pedido {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 320px;
            border-top: 4px solid #d4af37;
        }

        .tarjeta-pedido h4 {
            margin: 0 0 5px 0;
            color: #1a1a1a;
            font-size: 18px;
        }

        .tarjeta-pedido p {
            margin: 5px 0;
            color: #555;
            font-size: 14px;
        }

        .btn-ws {
            background-color: #25D366;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }

        .caja-modelos {
            margin-top: 15px;
            border-top: 1px dashed #ccc;
            padding-top: 10px;
        }

        .grid-botones {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-top: 10px;
        }

        .btn-mod {
            background: #f0f0f0;
            border: 1px solid #ccc;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-mod:hover {
            background: #d4af37;
            color: white;
        }
    </style>
</head>

<body>

    <h2 style="text-align: center; margin-bottom: 30px;">⏰ Pedidos Esperando Diseño</h2>

    <div id="cargando" style="text-align: center;">Buscando datos en la planilla... ⏳</div>

    <div class="contenedor-tarjetas" id="contenedor-tarjetas"></div>

    <script src="pendientes.js"></script>
</body>

</html>
