<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Portal Áurea Deco</title>
    <link rel="stylesheet" href="estilos.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body {
            background-color: var(--antracita);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .grid-portal {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1000px;
            margin: auto;
            padding: 40px;
        }

        .card-acceso {
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            text-decoration: none;
            text-align: center;
            border-bottom: 6px solid var(--dorado);
            transition: 0.3s;
        }

        .card-acceso:hover {
            transform: translateY(-10px);
            border-bottom-color: var(--oxido);
        }

        .card-acceso h3 {
            color: var(--antracita);
            margin: 0;
            font-weight: 800;
            font-size: 20px;
        }

        .card-acceso p {
            color: #888;
            font-size: 13px;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="header-sistema">
        <img src="logo aurea.png" alt="Áurea Deco">
    </div>
    <div class="grid-portal">
        <a href="index.html" class="card-acceso">
            <h3>MESA DE ENTRADA</h3>
            <p>Ingreso de Pedidos</p>
        </a>
        <a href="pendientes.html" class="card-acceso">
            <h3>MODELOS PDF</h3>
            <p>Confirmaciones</p>
        </a>
        <a href="disenador.html" class="card-acceso">
            <h3>DISEÑO</h3>
            <p>Bocetos y DXF</p>
        </a>
        <a href="taller.html" class="card-acceso">
            <h3>PRODUCCIÓN</h3>
            <p>Fabricación de piezas</p>
        </a>
        <a href="despacho.html" class="card-acceso">
            <h3>📦 CORREO</h3>
            <p>Logística</p>
        </a>
        <a href="tablero.html" class="card-acceso">
            <h3>📊 MONITOR</h3>
            <p>Estado Global</p>
        </a>
    </div>
    <div style="text-align: center; margin-top: 40px; margin-bottom: 20px;">
        <a href="imprimir.html" class="btn-aurea" style="
                text-decoration: none; 
                background: transparent; 
                color: var(--antracita); 
                padding: 8px 15px; 
                border: 2px solid var(--antracita); 
                font-size: 12px; 
                box-shadow: none;
            ">
            🗂️ ARCHIVO DE IMPRESIÓN
        </a>
    </div>
</body>

</html>
